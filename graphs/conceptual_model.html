  let fill,stroke,tc,fw;
  if(d.isAuth){fill=d.authColor;stroke=d.authColor;tc='#f0ece4';fw='400';}
  else{const col=ENTITY_COLORS[d.type]||ENTITY_COLORS.concept;fill=col.fill;stroke=col.stroke;tc=col.tc;fw=d.id===CENTER?'700':'600';}
  ng.append('circle').attr('r',d.r+3).attr('cx',2).attr('cy',3).attr('fill','rgba(0,0,0,.18)');
  ng.append('circle').attr('r',d.r).attr('fill',fill).attr('stroke',stroke).attr('stroke-width',2.5);
  const fs=d.id===CENTER?28:d.isAuth?18:22;
  const lh=d.id===CENTER?36:d.isAuth?24:28;
  const maxChars=12;
  function wrap(str,max){
    const lines=str.split('\n'),out=[];
    lines.forEach(seg=>{const words=seg.split(' ');let cur='';
      words.forEach(w=>{if((cur+(cur?' ':'')+w).length<=max)cur+=(cur?' ':'')+w;else{if(cur)out.push(cur);cur=w;}});
      if(cur)out.push(cur);});
    return out;
  }
  const rawLabel=d.isAuth?d.label:(d.label||d.id);
  const cls=CLASS_LABEL[d.id]?CLASS_LABEL[d.id].replace(/crm:|frbroo:/g,''):'';
  let lines;
  if(d.id==='The Wretched\nof the Earth')lines=['The Wretched','of the Earth'];
  else if(d.id==='Algerian Revolution')lines=['Algerian','Revolution'];
  else if(d.id==='Second Congress')lines=['Second','Congress'];
  else if(d.id==='Book Creation\nEvent')lines=['Book Creation','Event'];
  else lines=wrap(rawLabel,maxChars);
  const totalH=(lines.length-1)*lh;
  lines.forEach((line,i)=>{
    ng.append('text').attr('x',0).attr('y',-totalH/2+i*lh)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-family',FONT).attr('font-size',fs).attr('font-weight',fw)
      .attr('fill',tc).attr('pointer-events','none').text(line);
  });
  if(!d.isAuth&&cls&&d.id!==CENTER){
    ng.append('text').attr('x',0).attr('y',totalH/2+lh*0.9)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-family',"'IBM Plex Mono',monospace").attr('font-size',16)
      .attr('fill',tc).attr('opacity',.55).attr('pointer-events','none').text(cls);
  }
  ng.on('mousemove',function(e){
    const label=d.isAuth?`owl:sameAs → ${d.label}`:rawLabel.replace(/\n/g,' ');
    let html=`<div class="tt-lbl">${label}</div>`;
    if(CLASS_LABEL[d.id])html+=`<div class="tt-cls">${CLASS_LABEL[d.id]}</div>`;
    if(d.isAuth){html+=`<div class="tt-row">External authority record</div>`;}
    else{(d.triples||[]).slice(0,8).forEach(([p,o])=>{html+=`<div><span class="tt-row">${p} → </span><span class="tt-val">${o}</span></div>`;});}
    const tt=document.getElementById('tooltip');
    tt.innerHTML=html;tt.classList.add('vis');
    tt.style.left=(e.clientX+18)+'px';tt.style.top=(e.clientY-10)+'px';
  }).on('mouseleave',()=>document.getElementById('tooltip').classList.remove('vis'));
});
</script>
</body>
</html>
